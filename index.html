<button id="cancelEditBtn" class="btn cancel-edit" style="display:none;">CANCEL LEAVE</button>

<script>
  clearAllFields();
document.addEventListener("DOMContentLoaded", () => {

  const cancelEditBtn = document.getElementById("cancelEditBtn");

  if (!cancelEditBtn) return;

  cancelEditBtn.addEventListener("click", async function (e) {

    
    e.preventDefault(); // prevents any form behavior

    if (currentEditRowIndex === null) {
      alert("No record selected.");
      return;
    }

    if (!confirm("Mark this record as CANCELLED?")) return;

    const now = new Date();

    const formattedDate = now.toLocaleDateString("en-US", {
      month: "short",
      day: "numeric",
      year: "numeric"
    }).toUpperCase();

 const cancelHTML =
`<span style="background:#d3d3d3;color:black;font-weight:bold;padding:2px 6px;border-radius:3px;">CANCELLED</span> - ${formattedDate}`;





    const rows = document.querySelectorAll("#dataGrid tbody tr");
    const row = rows[currentEditRowIndex - 2];

    if (!row) {
      alert("Row not found.");
      return;
    }

    const remarksCell = row.cells[7];
    const actionCell = row.cells[8];

    const existingRemarks = remarksCell.innerHTML
  .replace(/(<br>\s*)+$/g, "")
  .trim();

// 🚫 PREVENT DOUBLE CANCEL
if (existingRemarks.toUpperCase().includes("CANCELLED")) {

  document.getElementById("modalMessage").innerText = "This record is already CANCELLED.";
  document.getElementById("modalNotification").style.display = "flex";

  return; // stop execution
}

const finalRemarks = existingRemarks
  ? existingRemarks + "<br>" + cancelHTML
  : cancelHTML;
    try {

      await fetch(googleSheetsUrl, {
  method: "POST",
  mode: "no-cors",
  headers: { "Content-Type": "text/plain" },
  body: JSON.stringify({
    rowToUpdate: currentEditRowIndex,
    action: "CANCEL",
    dateStamp: finalRemarks,
    isUpdateOnly: true
  })
});

      // Update UI only (does not touch form panel)
      remarksCell.innerHTML = finalRemarks;

      document.getElementById("modalMessage").innerText = "Record Cancelled";
document.getElementById("modalNotification").style.display = "flex";

      actionCell.innerHTML = `
        <button disabled style="
          background:#d3d3d3;
          color:black;
          font-weight:bold;
          border:none;
          padding:6px 10px;
          border-radius:4px;
        ">
          CANCELLED
        </button>
      `;

      row.style.opacity = "0.6";

      // Exit edit mode safely
      currentEditRowIndex = null;

      const deleteBtn = document.getElementById("deleteBtn");
      if (deleteBtn) deleteBtn.style.display = "none";

      cancelEditBtn.style.display = "none";

      if (typeof saveBtn !== "undefined") {
        saveBtn.innerText = "SAVE DATA";
        saveBtn.style.backgroundColor = "";
      }

    } catch (error) {
      console.error("Cancel failed:", error);
      alert("Cancel failed.");
    }

  });

});




function clearAllFields() {

  // text inputsf
  document.getElementById("client").value = "";
  document.getElementById("GENDER").value = "";
  document.getElementById("TYPEOFDOCUMENT").value = "";
  document.getElementById("document").value = "";
  document.getElementById("division").value = "";
  document.getElementById("remarks").value = "";

  // datetime picker
  document.getElementById("dateReleased").value = "";

  // flatpickr multi date
  if (typeof picker !== "undefined" && picker) {
    picker.clear();
  }

}



document.getElementById("deleteBtn").addEventListener("click", async function () {

  if (currentEditRowIndex === null) {
    alert("No record selected to delete.");
    return;
  }

  if (!confirm("Are you sure you want to permanently delete this record?")) return;

  try {

    await fetch(googleSheetsUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({
        action: "DELETE",
        rowIndex: currentEditRowIndex
      })
    });

    // Remove row visually from table
    const rows = document.querySelectorAll("#dataGrid tbody tr");
    const row = rows[currentEditRowIndex - 2];

    if (row) {
      row.remove();
    }

    alert("Record deleted successfully.");

    // reset edit mode
    currentEditRowIndex = null;

    const deleteBtn = document.getElementById("deleteBtn");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    if (deleteBtn) deleteBtn.style.display = "none";
    if (cancelEditBtn) cancelEditBtn.style.display = "none";

    if (typeof resetFormAfterSave === "function") {
      resetFormAfterSave();
    }

    if (typeof loadDataFromSheet === "function") {
      setTimeout(loadDataFromSheet, 800);
    }

  } catch (err) {

    console.error("Delete failed:", err);
    alert("Delete failed.");

  }

});




</script>

<script>
// ===== EXCEL EXPORT WITH DIRECT SAVE DIALOGUE (NO MODAL) =====
async function exportToExcel() {
  const table = document.getElementById('dataGrid');
  
  if (!table) {
    alert("Table not found!");
    return;
  }

  try {
    // 1. Prepare the data (Clone and remove ACTIONS column)
    const clone = table.cloneNode(true);
    const rows = clone.querySelectorAll('tr');
    rows.forEach(row => {
      if (row.cells.length > 0) row.deleteCell(-1);
    });

    // 2. Convert to Excel Workbook
    const wb = XLSX.utils.table_to_book(clone, { sheet: "Leave Records" });
    const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

    // 3. Open System Save Dialogue
    if (window.showSaveFilePicker) {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'BENRO_LEAVE_Records.xlsx',
        types: [{
          description: 'Excel Workbook',
          accept: {'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx']},
        }],
      });
      
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      
      alert("File saved successfully!"); 
    } else {
      // Fallback for browsers without Picker support (Firefox/Mobile)
      XLSX.writeFile(wb, "BENRO_LEAVE_Records.xlsx");
    }

  } catch (err) {
    // Silently handle user clicking "Cancel" in the dialog
    if (err.name !== 'AbortError') {
      console.error("Export failed:", err);
      alert("An error occurred during export.");
    }
  }
}

// Connect button
document.addEventListener('DOMContentLoaded', () => {
    const printBtn = document.getElementById('printBtn');
    if (printBtn) {
        printBtn.addEventListener('click', exportToExcel);
    }
});
</script>
